<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Barsha ❤️</title>
    <!-- Importing Romantic Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents scrollbars from falling hearts */
        }

        /* The Main Card */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            z-index: 10;
            position: relative;
            animation: popIn 1s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Big Beating Heart */
        .heart-icon {
            font-size: 80px;
            color: #ff4b4b;
            animation: beat 1.2s infinite;
            margin-bottom: 20px;
            display: inline-block;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            15% { transform: scale(1.2); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        /* Typography */
        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff4b4b;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h2 {
            color: #555;
            font-weight: 600;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* The Button */
        .btn {
            background-color: #ff4b4b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            outline: none;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 75, 75, 0.3);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Hidden Message */
        #message {
            display: none;
            margin-top: 20px;
            color: #ff4b4b;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* --- FALLING HEARTS ANIMATION --- */
        .falling-heart {
            position: absolute;
            top: -20px;
            color: #ff4b4b;
            font-size: 20px;
            animation: fall linear infinite;
            z-index: 1;
            opacity: 0.8;
        }

        @keyframes fall {
            0% {
                top: -10vh;
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                top: 110vh;
                transform: translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- The Main Container -->
    <div class="card">
        <div class="heart-icon">❤</div>
        <h1>I'm Sorry,<br>Barsha</h1>
        <h2>I messed up.</h2>
        <p>
            Barsha, you mean the world to me. I hate seeing you upset, and I regret every word that hurt you. 
            <br><br>
            Please forgive me. I promise to be better. You are my heart.
        </p>
        
        <button class="btn" onclick="showLove()">Forgive Me?</button>
        <div id="message">❤️ I love you, Barsha! ❤️</div>
    </div>

    <!-- Container for JS to add hearts -->
    <div id="hearts-container"></div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        function showLove() {
            const btn = document.querySelector('.btn');
            const msg = document.getElementById('message');
            
            btn.innerHTML = "Thank You!";
            btn.style.backgroundColor = "#4bff6b"; // Change to green
            btn.style.color = "#004d00";
            msg.style.display = "block";
            
            // Trigger a heart explosion on click
            createHeartExplosion();
        }

        function createHeartExplosion() {
            for(let i = 0; i < 50; i++) {
                createHeart();
            }
        }

        // Function to create a single falling heart
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤';
            
            // Randomize position and speed
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's'; // Between 2 and 5 seconds
            heart.style.opacity = Math.random();
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            
            document.body.appendChild(heart);

            // Remove heart after animation ends to keep browser fast
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Create a new heart every 300ms automatically
        setInterval(createHeart, 300);

    </script>
</body>
</html>
